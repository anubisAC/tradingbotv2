name: Phase 3 AI Quant Trader

on:
  schedule:
    # Executes at 19:45 UTC (3:45 PM EDT) Monday through Friday.
    - cron: '45 19 * * 1-5'
  workflow_dispatch:

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Live Trades
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_PAPER: ${{ secrets.APCA_PAPER }}
        run: |
          python quant_trader.py

      - name: Sync Grossman-Zhou State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add gz_state.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update HWM state [skip ci]" && git push)